version: "3"

includes:
  configctl:
    taskfile: ./tools/configctl/Taskfile.yml
    dir: ./tools/configctl

tasks:
  install:
    desc: Install public dotfiles and private-config when available
    cmds:
      - task: configctl:build
      - tools/configctl/bin/configctl home apply {{.CLI_ARGS}}

  private:init:
    desc: Scaffold a local-only private-config overlay repo
    cmds:
      - ./init-private-overlay.sh

  dotfiles:verify:
    desc: Verify public dotfile config surfaces
    cmds:
      - task: nix:build
      - task: configctl:verify
      - tools/configctl/bin/configctl --json verify --profile full >/dev/null
      - task: security:approved-gh-account
      - task: verify:lazygit
      - task: verify:nvim
      - task: verify:terminal
      - task: secrets:staged
      - task: secrets:full

  security:approved-gh-account:
    desc: Reject unapproved GitHub CLI auth
    cmds:
      - |
        if ! command -v gh >/dev/null 2>&1; then
          exit 0
        fi
        status="$(gh auth status --hostname github.com 2>&1)" || exit 0
        accounts="$(printf '%s\n' "$status" | sed -nE 's/.*Logged in to github.com account ([^ ]+) .*/\1/p' | sort -u)"
        approved_accounts="${APPROVED_GITHUB_CLI_ACCOUNTS:-gh-xj}"

        if [ -z "$accounts" ]; then
          printf '%s\n' "Unable to parse GitHub CLI auth status for github.com." >&2
          exit 1
        fi

        for account in $accounts; do
          case " $approved_accounts " in
            *" $account "*) ;;
            *)
              printf '%s\n' "GitHub CLI account '$account' is not approved for this machine." >&2
              printf '%s\n' "Approved accounts: $approved_accounts" >&2
              exit 1
              ;;
          esac
        done

  nix:build:
    desc: Build the public Nix example Home Manager activation package
    preconditions:
      - sh: command -v nix >/dev/null 2>&1
        msg: "nix is required to build the public dotfiles flake"
    cmds:
      - nix build --no-link .#homeConfigurations.example.activationPackage

  verify:lazygit:
    desc: Verify lazygit config and required helpers
    cmds:
      - task: configctl:build
      - tools/configctl/bin/configctl app lazygit verify

  verify:nvim:
    desc: Verify Neovim starts with this config
    cmds:
      - task: configctl:build
      - tools/configctl/bin/configctl app nvim verify

  verify:terminal:
    desc: Verify terminal app workflow
    cmds:
      - task: configctl:build
      - tools/configctl/bin/configctl app terminal verify

  shell:bench:
    desc: Benchmark zsh startup paths and shell init components
    preconditions:
      - sh: command -v hyperfine >/dev/null 2>&1
        msg: "hyperfine is required to benchmark shell startup"
      - sh: command -v zsh >/dev/null 2>&1
        msg: "zsh is required to benchmark shell startup"
    cmds:
      - ./scripts/shell-bench.sh {{.CLI_ARGS}}

  starship:diagnose:
    desc: Diagnose Starship prompt scan warnings and module timings
    preconditions:
      - sh: command -v starship >/dev/null 2>&1
        msg: "starship is required to diagnose prompt scans"
      - sh: command -v zsh >/dev/null 2>&1
        msg: "zsh is required for millisecond prompt timing"
    cmds:
      - ./scripts/starship-diagnose.sh {{.CLI_ARGS}}

  secrets:staged:
    desc: Scan staged public-dotfiles changes for secrets
    cmds:
      - gitleaks protect --staged --source . --redact --no-banner

  secrets:full:
    desc: Scan the entire working tree (including history) for secrets
    cmds:
      - gitleaks detect --source . --redact --no-banner

  doctor:
    desc: Run full configctl verification
    cmds:
      - task: configctl:build
      - tools/configctl/bin/configctl verify --profile full

  help:
    desc: Show available tasks
    cmds:
      - task --list

  nvim-tmux:build:
    desc: Build the nvim-tmux URL handler binary
    dir: Library/nvim-tmux
    sources: [main.go, go.mod]
    generates: [bin/nvim-tmux]
    cmds:
      - go build -trimpath -ldflags="-s -w" -o bin/nvim-tmux .

  nvim-tmux:install:
    desc: Copy the built nvim-tmux binary into ~/Applications/nvim-tmux.app
    deps: [nvim-tmux:build]
    preconditions:
      - sh: test -d "$HOME/Applications/nvim-tmux.app/Contents/Resources"
        msg: "~/Applications/nvim-tmux.app doesn't exist yet — see Library/nvim-tmux/README.md for first-time setup"
    cmds:
      - cp Library/nvim-tmux/bin/nvim-tmux "$HOME/Applications/nvim-tmux.app/Contents/Resources/nvim-tmux"
      - cp Library/nvim-tmux/handler.sh "$HOME/Applications/nvim-tmux.app/Contents/Resources/handler.sh"
      - chmod +x "$HOME/Applications/nvim-tmux.app/Contents/Resources/nvim-tmux"
      - chmod +x "$HOME/Applications/nvim-tmux.app/Contents/Resources/handler.sh"
