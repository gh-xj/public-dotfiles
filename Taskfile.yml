version: "3"

vars:
  NIX_FLAGS: --extra-experimental-features 'nix-command flakes'

env:
  NIX_CONFIG: experimental-features = nix-command flakes

tasks:
  install:
    desc: Apply the local public Home Manager example
    cmds:
      - nix {{.NIX_FLAGS}} run github:nix-community/home-manager/master -- switch --flake .#example {{.CLI_ARGS}}

  dotfiles:verify:
    desc: Verify public dotfile config surfaces
    cmds:
      - task: dotfiles:verify-user
      - task: verify:bootstrap-darwin
      - task: verify:display-layout
      - task: verify:macos-defaults
      - task: verify:raycast
      - task: verify:raycast-scripts
      - task: verify:terminal
      - task: secrets:staged
      - task: secrets:full

  dotfiles:verify-user:
    desc: Verify user-level public dotfile config surfaces
    cmds:
      - task: nix:build
      - task: verify:home-files
      - task: verify:global-taskfile
      - task: verify:codex-runtime-boundary
      - task: verify:zsh
      - task: verify:npm-globals
      - task: security:approved-gh-account
      - task: verify:lazygit
      - task: verify:nvim

  verify:bootstrap-darwin:
    desc: Verify the generated nix-darwin bootstrap host builds
    cmds:
      - ./scripts/bootstrap-macos.sh --darwin --dry-run --user example --home /Users/example

  verify:home-files:
    desc: Verify Home Manager owns the expected public config files
    cmds:
      - ./scripts/verify-home-files.sh

  verify:global-taskfile:
    desc: Verify public global go-task Taskfile
    cmds:
      - ./scripts/verify-global-taskfile.sh

  verify:codex-runtime-boundary:
    desc: Verify public Codex config stays template-only and live-mutable
    cmds:
      - ./scripts/verify-codex-runtime-boundary.sh

  display:apply:
    desc: Apply known display layout policy
    cmds:
      - ./scripts/apply-display-layout.sh --apply

  input:apply:
    desc: Apply input defaults and reload live trackpad state
    cmds:
      - ./scripts/apply-current-host-defaults.sh --apply

  input:verify:
    desc: Verify persisted and live mouse, keyboard, and trackpad defaults
    cmds:
      - ./scripts/apply-current-host-defaults.sh --verify

  verify:display-layout:
    desc: Verify known display layout policy
    cmds:
      - ./scripts/apply-display-layout.sh --verify

  verify:macos-defaults:
    desc: Verify this host matches the public macOS defaults baseline
    cmds:
      - ./scripts/verify-macos-defaults.sh

  verify:raycast:
    desc: Verify public-safe Raycast preferences
    cmds:
      - ./scripts/verify-raycast-preferences.sh

  verify:raycast-scripts:
    desc: Verify public Raycast Script Commands
    cmds:
      - ./scripts/verify-raycast-script-commands.sh

  verify:raycast-extensions:
    desc: Check desired Raycast Store extensions
    cmds:
      - ./scripts/verify-raycast-extensions.sh

  raycast:open-extension-installs:
    desc: Open Raycast install intents for missing desired Store extensions
    cmds:
      - ./scripts/verify-raycast-extensions.sh --open-missing

  raycast:runtime-check:
    desc: Diagnose Raycast Script Command runtime setup
    cmds:
      - ./scripts/diagnose-raycast-runtime.sh

  raycast:open-script-setup:
    desc: Open Raycast setup for public Script Commands
    cmds:
      - ./scripts/diagnose-raycast-runtime.sh --open-setup

  spaces:apply:
    desc: Apply the desired Mission Control Spaces count
    cmds:
      - ./scripts/verify-spaces.sh --apply

  spaces:request-permission:
    desc: Open Accessibility settings for Spaces automation
    cmds:
      - ./scripts/verify-spaces.sh --request-permission

  verify:spaces:
    desc: Check the desired Mission Control Spaces count
    cmds:
      - ./scripts/verify-spaces.sh

  inspect:macos-baseline:
    desc: Print a public-safe macOS and Raycast baseline inventory
    cmds:
      - ./scripts/inspect-macos-baseline.sh

  verify:npm-globals:
    desc: Verify public npm global CLIs are installed
    cmds:
      - ./scripts/verify-npm-globals.sh

  security:approved-gh-account:
    desc: Reject unapproved GitHub CLI auth
    cmds:
      - |
        if ! command -v gh >/dev/null 2>&1; then
          exit 0
        fi
        status="$(gh auth status --hostname github.com 2>&1)" || exit 0
        accounts="$(printf '%s\n' "$status" | sed -nE 's/.*Logged in to github.com account ([^ ]+) .*/\1/p' | sort -u)"
        approved_accounts="${APPROVED_GITHUB_CLI_ACCOUNTS:-gh-xj}"

        if [ -z "$accounts" ]; then
          printf '%s\n' "Unable to parse GitHub CLI auth status for github.com." >&2
          exit 1
        fi

        for account in $accounts; do
          case " $approved_accounts " in
            *" $account "*) ;;
            *)
              printf '%s\n' "GitHub CLI account '$account' is not approved for this machine." >&2
              printf '%s\n' "Approved accounts: $approved_accounts" >&2
              exit 1
              ;;
          esac
        done

  nix:build:
    desc: Build the public Nix example Home Manager activation package
    preconditions:
      - sh: command -v nix >/dev/null 2>&1
        msg: "nix is required to build the public dotfiles flake"
    cmds:
      - nix {{.NIX_FLAGS}} build --no-link .#homeConfigurations.example.activationPackage

  verify:lazygit:
    desc: Verify lazygit config and required helpers
    cmds:
      - ruby -ryaml -e 'YAML.load_file(".config/lazygit/config.yml")'
      - command -v lazygit
      - command -v delta
      - command -v difft
      - command -v gh

  verify:nvim:
    desc: Verify Neovim starts with this config
    cmds:
      - nvim --headless '+qa'

  verify:terminal:
    desc: Verify terminal app workflow
    cmds:
      - ./scripts/verify-terminal.sh

  verify:zsh:
    desc: Verify zsh startup and plugin contract
    preconditions:
      - sh: command -v zsh >/dev/null 2>&1
        msg: "zsh is required to verify shell startup"
    cmds:
      - ./scripts/verify-zsh.sh

  shell:bench:
    desc: Benchmark zsh startup paths and shell init components
    preconditions:
      - sh: command -v hyperfine >/dev/null 2>&1
        msg: "hyperfine is required to benchmark shell startup"
      - sh: command -v zsh >/dev/null 2>&1
        msg: "zsh is required to benchmark shell startup"
    cmds:
      - ./scripts/shell-bench.sh {{.CLI_ARGS}}

  starship:diagnose:
    desc: Diagnose Starship prompt scan warnings and module timings
    preconditions:
      - sh: command -v starship >/dev/null 2>&1
        msg: "starship is required to diagnose prompt scans"
      - sh: command -v zsh >/dev/null 2>&1
        msg: "zsh is required for millisecond prompt timing"
    cmds:
      - ./scripts/starship-diagnose.sh {{.CLI_ARGS}}

  secrets:staged:
    desc: Scan staged public-dotfiles changes for secrets
    cmds:
      - gitleaks protect --staged --source . --redact --no-banner

  secrets:full:
    desc: Scan the entire working tree (including history) for secrets
    cmds:
      - gitleaks detect --source . --redact --no-banner

  doctor:
    desc: Run public dotfiles verification
    cmds:
      - task: dotfiles:verify

  help:
    desc: Show available tasks
    cmds:
      - task --list

  nvim-tmux:build:
    desc: Build the nvim-tmux URL handler binary
    dir: Library/nvim-tmux
    sources: [main.go, go.mod]
    generates: [bin/nvim-tmux]
    cmds:
      - go build -trimpath -ldflags="-s -w" -o bin/nvim-tmux .

  nvim-tmux:install:
    desc: Copy the built nvim-tmux binary into ~/Applications/nvim-tmux.app
    deps: [nvim-tmux:build]
    preconditions:
      - sh: test -d "$HOME/Applications/nvim-tmux.app/Contents/Resources"
        msg: "~/Applications/nvim-tmux.app doesn't exist yet — see Library/nvim-tmux/README.md for first-time setup"
    cmds:
      - cp Library/nvim-tmux/bin/nvim-tmux "$HOME/Applications/nvim-tmux.app/Contents/Resources/nvim-tmux"
      - cp Library/nvim-tmux/handler.sh "$HOME/Applications/nvim-tmux.app/Contents/Resources/handler.sh"
      - chmod +x "$HOME/Applications/nvim-tmux.app/Contents/Resources/nvim-tmux"
      - chmod +x "$HOME/Applications/nvim-tmux.app/Contents/Resources/handler.sh"
