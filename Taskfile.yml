version: "3"

tasks:
  install:
    desc: Install public dotfiles and private-config when available
    cmds:
      - ./install.sh {{.CLI_ARGS}}

  private:init:
    desc: Scaffold a local-only private-config overlay repo
    cmds:
      - ./init-private-overlay.sh

  dotfiles:verify:
    desc: Verify public dotfile config surfaces
    cmds:
      - task: verify:lazygit
      - task: verify:nvim
      - task: secrets:staged

  verify:lazygit:
    desc: Verify lazygit config and required helpers
    cmds:
      - ruby -ryaml -e 'YAML.load_file(".config/lazygit/config.yml")'
      - command -v lazygit
      - command -v delta
      - command -v difft
      - command -v gh

  verify:nvim:
    desc: Verify Neovim starts with this config
    cmds:
      - nvim --headless +qa

  secrets:staged:
    desc: Scan staged public-dotfiles changes for secrets
    cmds:
      - gitleaks protect --staged --source . --redact --no-banner

  help:
    desc: Show available tasks
    cmds:
      - task --list

  nvim-tmux:build:
    desc: Build the nvim-tmux URL handler binary
    dir: Library/nvim-tmux
    sources: [main.go, go.mod]
    generates: [bin/nvim-tmux]
    cmds:
      - go build -trimpath -ldflags="-s -w" -o bin/nvim-tmux .

  nvim-tmux:install:
    desc: Copy the built nvim-tmux binary into ~/Applications/nvim-tmux.app
    deps: [nvim-tmux:build]
    preconditions:
      - sh: test -d "$HOME/Applications/nvim-tmux.app/Contents/Resources"
        msg: "~/Applications/nvim-tmux.app doesn't exist yet — see Library/nvim-tmux/README.md for first-time setup"
    cmds:
      - cp Library/nvim-tmux/bin/nvim-tmux "$HOME/Applications/nvim-tmux.app/Contents/Resources/nvim-tmux"
      - cp Library/nvim-tmux/handler.sh "$HOME/Applications/nvim-tmux.app/Contents/Resources/handler.sh"
      - chmod +x "$HOME/Applications/nvim-tmux.app/Contents/Resources/nvim-tmux"
      - chmod +x "$HOME/Applications/nvim-tmux.app/Contents/Resources/handler.sh"
