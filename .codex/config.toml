# Public-safe Codex baseline. Keep custom providers, per-project trust, auth,
# and runtime state in the private repo or live home directory.
model_reasoning_effort = "xhigh"
model_provider = "OpenAI"
model = "gpt-5.4"
review_model = "gpt-5.4"
personality = "pragmatic"
approvals_reviewer = "user"
disable_response_storage = true
network_access = "enabled"
windows_wsl_setup_acknowledged = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000
service_tier = "fast"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[tui]
theme = "catppuccin-latte"
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "fast-mode"]

[features]
multi_agent = true
child_agents_md = true

[agents]
max_threads = 6
max_depth = 2
