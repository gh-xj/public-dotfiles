# Minimal beginner tmux config.
# Close to tmux defaults so tutorials and docs match what you see.

# Reset a few old custom bindings so reloading into an existing server is clean.
unbind C-Space
unbind d
unbind D
unbind h
unbind j
unbind k
unbind l
unbind -n C-Left
unbind -n C-Right
unbind -n M-h
unbind -n M-j
unbind -n M-k
unbind -n M-l
unbind -n M-1
unbind -n M-2
unbind -n M-3
unbind -n M-4
unbind -n M-5
unbind -n M-6
unbind -n M-7
unbind -n M-8
unbind -n M-9
unbind -n M-H
unbind -n M-J
unbind -n M-K
unbind -n M-L
unbind -n M-f
unbind -n C-s
unbind -T prefix C-b
unbind -T prefix C-d
unbind -T prefix C-s

set -s escape-time 0
# Ghostty forwards several cmd-based shortcuts by sending the tmux prefix byte.
# Keep Ghostty's injected byte in sync when this prefix changes.
set -g prefix C-s
set -g base-index 1
set -g default-terminal "tmux-256color"
set -g renumber-windows on
set -g status-position bottom
set -g set-titles on
set -g set-titles-string '#S:#W'
bind C-s send-prefix
bind d detach-client
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Force pane swaps to use the active pane in the current window.
# This avoids tmux falling back to a marked pane from another window/session.
bind \{ swap-pane -s . -t '{previous}'
bind \} swap-pane -s . -t '{next}'
bind H run-shell 'wid=$(tmux display-message -p "#{window_id}"); tmux swap-window -t :-1; tmux select-window -t "$wid"'
bind L run-shell 'wid=$(tmux display-message -p "#{window_id}"); tmux swap-window -t :+1; tmux select-window -t "$wid"'
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf sourced"
bind R command-prompt -I "#S" { rename-session "%%" }
bind M command-prompt -p "move window to session:window" { move-window -t "%%" }
bind P command-prompt -p "move pane to session:window" { move-pane -t "%%" }
bind S command-prompt -p "new session name" { new-session -A -s "%%" }
# C-hjkl: smart-splits — forwards to nvim when inside nvim, otherwise moves tmux pane
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
# M-jk: fallback pane navigation (no prefix needed); M-h/l reserved for nvim buffer switching
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-a select-pane -t 1
bind -n M-b select-pane -t 2
bind -n M-c select-pane -t 3
bind -n M-e select-pane -t 4
bind -n M-g select-pane -t 5
bind -n M-i select-pane -t 6
bind -n M-o select-pane -t 7
bind -n M-p select-pane -t 8
bind -n M-u select-pane -t 9
bind -n M-y run-shell "tmux select-pane -t :.#{window_panes}"
bind -n M-d split-window -h
bind -n M-w kill-pane
bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3
bind -n M-f resize-pane -Z
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 run-shell "tmux select-window -t :#{session_windows}"
bind M-1 join-pane -t :1
bind M-2 join-pane -t :2
bind M-3 join-pane -t :3
bind M-4 join-pane -t :4
bind M-5 join-pane -t :5
bind M-6 join-pane -t :6
bind M-7 join-pane -t :7
bind M-8 join-pane -t :8
bind M-9 join-pane -t :9
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi J send-keys -X -N 5 cursor-down
bind -T copy-mode-vi K send-keys -X -N 5 cursor-up
bind -T copy-mode-vi t send-keys -X scroll-top
setw -g automatic-rename off
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
bind W choose-tree -Z

# One Dark theme — matches Zed (One Dark Pro) and Neovim (Atom One Dark).
# Use ~/.tmux.local.conf for host-local overrides.
if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
set -g status-style                "bg=#282c34,fg=#abb2bf"
set -g window-status-style         "bg=#282c34,fg=#5c6370"
set -g window-status-current-style "bg=#3e4451,fg=#61afef,bold"
set -g window-status-format        " #I:#W "
set -g window-status-current-format " #I:#W "
set -g pane-border-style           "fg=#3e4451"
set -g pane-active-border-style    "fg=#61afef"
set -g message-style               "bg=#3e4451,fg=#abb2bf"
set -g mode-style                  "bg=#3e4451,fg=#abb2bf"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left  "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#282c34,fg=#61afef] "
set -g status-right "#[fg=#5c6370] #{b:pane_current_path}  %H:%M "
