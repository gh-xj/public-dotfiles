# Minimal beginner tmux config.
# Close to tmux defaults so tutorials and docs match what you see.

# Defensive unbinds for keys that are NOT rebound below. Keeps reloads clean
# when an older config left bindings in a running server. Keys that ARE
# rebound below don't need explicit unbinds — `bind` already replaces.
unbind C-Space
unbind D
unbind -n C-Left
unbind -n C-Right
unbind -n M-h
unbind -n M-l
unbind -n C-s
unbind -n C-t
unbind -T prefix C-b
unbind -T prefix C-d
unbind -T prefix C-f
unbind -T prefix g
unbind -T prefix t
unbind -T prefix Y

set -s escape-time 0
# Ghostty forwards several cmd-based shortcuts by sending the tmux prefix byte.
# Keep Ghostty's injected byte in sync when this prefix changes.
set -g prefix C-s
set -g base-index 1
set -g default-terminal "tmux-256color"
set -g renumber-windows on
set -g status-position bottom
set -g set-titles on
set -g set-titles-string '#S:#W'
bind C-s send-prefix
bind d detach-client
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Force pane swaps to use the active pane in the current window.
# This avoids tmux falling back to a marked pane from another window/session.
bind \{ swap-pane -s . -t '{previous}'
bind \} swap-pane -s . -t '{next}'
# swap-window -d keeps the active window's ID on the moved content, so you
# follow the window you just repositioned instead of staying at the old index.
bind H swap-window -d -t :-1
bind L swap-window -d -t :+1
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf sourced"
bind R command-prompt -I "#S" { rename-session "%%" }
bind M command-prompt -p "move window to session:window" { move-window -t "%%" }
bind P command-prompt -p "move pane to session:window" { move-pane -t "%%" }
bind S command-prompt -p "new session name" { new-session -A -s "%%" }
# C-hjkl: smart-splits — forwards to nvim when inside nvim, otherwise moves tmux pane
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
# M-jk: fallback pane navigation (no prefix needed); M-h/l reserved for nvim buffer switching
bind -n M-j select-pane -D
bind -n M-k select-pane -U
# Pane-number shortcuts mapped onto letters (a=1, b=2, c=3, e=4, g=5, i=6,
# o=7, p=8, u=9). Picked for personal muscle memory; update this comment if
# the mapping ever changes so future-you knows why.
bind -n M-a select-pane -t 1
bind -n M-b select-pane -t 2
bind -n M-c select-pane -t 3
bind -n M-e select-pane -t 4
bind -n M-g select-pane -t 5
bind -n M-i select-pane -t 6
bind -n M-o select-pane -t 7
bind -n M-p select-pane -t 8
bind -n M-u select-pane -t 9
bind -n M-y run-shell "tmux select-pane -t :.#{window_panes}"
bind -n M-d split-window -h -c "#{pane_current_path}" \; select-layout even-horizontal
bind -n M-w kill-pane
# Pane resize: press prefix, then tap arrows repeatedly (repeat-key mode).
# Uses plain arrows — no Alt/Ctrl — so no collision with shell word-motion.
bind -r Left  resize-pane -L 20
bind -r Down  resize-pane -D 20
bind -r Up    resize-pane -U 20
bind -r Right resize-pane -R 20
bind -n M-f resize-pane -Z
# Scrollback: Ctrl-Space toggles copy-mode (enter from normal, exit from copy).
# Once in, vi-mode Ctrl-u / Ctrl-d half-page, k/j line, g/G top/bottom,
# / search, q or Ctrl-Space to exit.
bind -n C-Space copy-mode
bind -T copy-mode-vi C-Space send-keys -X cancel
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t '{end}'
bind -n M-Tab last-window
bind M-1 join-pane -t :1
bind M-2 join-pane -t :2
bind M-3 join-pane -t :3
bind M-4 join-pane -t :4
bind M-5 join-pane -t :5
bind M-6 join-pane -t :6
bind M-7 join-pane -t :7
bind M-8 join-pane -t :8
bind M-9 join-pane -t :9
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9
# Layouts: prefix + 1..5 picks a preset layout; prefix + Space still cycles.
# (M-1..9 / C-1..9 already handle window selection, so we don't need prefix+digit for that.)
bind 1 select-layout even-horizontal
bind 2 select-layout even-vertical
bind 3 select-layout main-horizontal
bind 4 select-layout main-vertical
bind 5 select-layout tiled

setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi J send-keys -X -N 5 cursor-down
bind -T copy-mode-vi K send-keys -X -N 5 cursor-up
bind -T copy-mode-vi t send-keys -X scroll-top
setw -g automatic-rename off
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
bind W choose-tree -Z

# Theme selector:
# - Shared default is dark.
# - Per-Mac override lives in ~/.tmux.local.conf:
#     set -g @theme light
#     set -g @theme dark
set -g @theme dark
source-file -q ~/.tmux.local.conf

# Shared status layout across themes.
set -g window-status-format         " #I:#W "
set -g window-status-current-format " #I:#W "
set -g status-left-length 100
set -g status-right-length 100

# Theme palette.
if -F '#{==:#{@theme},light}' {
    set -g status-style                "bg=#eff1f5,fg=#4c4f69"
    set -g window-status-style         "bg=#eff1f5,fg=#8c8fa1"
    set -g window-status-current-style "bg=#dce0e8,fg=#1e66f5,bold"
    set -g pane-border-style           "fg=#ccd0da"
    set -g pane-active-border-style    "fg=#1e66f5"
    set -g message-style               "bg=#dce0e8,fg=#4c4f69"
    set -g mode-style                  "bg=#dce0e8,fg=#4c4f69"
    set -g status-left  "#[bg=#1e66f5,fg=#eff1f5,bold] #S #[bg=#eff1f5,fg=#1e66f5] "
    set -g status-right "#[fg=#8c8fa1] #{b:pane_current_path}  %H:%M "
} {
    set -g status-style                "bg=#282c34,fg=#abb2bf"
    set -g window-status-style         "bg=#282c34,fg=#5c6370"
    set -g window-status-current-style "bg=#3e4451,fg=#61afef,bold"
    set -g pane-border-style           "fg=#3e4451"
    set -g pane-active-border-style    "fg=#61afef"
    set -g message-style               "bg=#3e4451,fg=#abb2bf"
    set -g mode-style                  "bg=#3e4451,fg=#abb2bf"
    set -g status-left  "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#282c34,fg=#61afef] "
    set -g status-right "#[fg=#5c6370] #{b:pane_current_path}  %H:%M "
}

# Plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'roy2220/easyjump.tmux'
set -g @plugin '27medkamal/tmux-session-wizard'
set -g @plugin 'sainnhe/tmux-fzf'

TMUX_FZF_LAUNCH_KEY="F"
TMUX_FZF_OPTIONS="-p -w 80% -h 70% -m"
TMUX_FZF_ORDER="session|window|pane|command|keybinding|clipboard|process"
TMUX_FZF_PREVIEW=1

# Keep TPM bootstrap last so all plugin declarations are loaded first.
run '~/.tmux/plugins/tpm/tpm'
