# Minimal beginner tmux config.
# Close to tmux defaults so tutorials and docs match what you see.

# Reset a few old custom bindings so reloading into an existing server is clean.
unbind C-Space
unbind d
unbind D
unbind h
unbind j
unbind k
unbind l
unbind -n C-Left
unbind -n C-Right
unbind -n M-h
unbind -n M-j
unbind -n M-k
unbind -n M-l
unbind -n M-1
unbind -n M-2
unbind -n M-3
unbind -n M-4
unbind -n M-5
unbind -n M-6
unbind -n M-7
unbind -n M-8
unbind -n M-9
unbind -n M-H
unbind -n M-J
unbind -n M-K
unbind -n M-L
unbind -n M-f

set -s escape-time 0
set -g prefix C-s
set -g base-index 1
set -g default-terminal "tmux-256color"
set -g renumber-windows on
set -g status-position bottom
set -g set-titles on
set -g set-titles-string '#S:#W'
bind C-s send-prefix
bind d detach-client
bind '"' split-window -v
bind % split-window -h
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf sourced"
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-H resize-pane -L 3
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 3
bind -n M-f resize-pane -Z
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

setw -g mode-keys vi
setw -g automatic-rename on
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
bind W choose-tree -Z

# Catppuccin theme synced to macOS appearance.
run-shell -b "$HOME/.tmux-catppuccin-theme-sync.sh"
set -g @catppuccin_window_status_style "slanted"
set-hook -g client-attached "run-shell -b '$HOME/.tmux-catppuccin-theme-sync.sh'"
set-hook -g client-focus-in "run-shell -b '$HOME/.tmux-catppuccin-theme-sync.sh'"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory} #{E:@catppuccin_status_date_time}"
